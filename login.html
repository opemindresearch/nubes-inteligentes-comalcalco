<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>IAMx · Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #e8ebe3;
            --a: #8ec63f;
            --b: #5fae3c;
            --g: #aadc44;
            --text: #1c1f17;
            --muted: #7a8070;
            --sans: 'Inter', ui-sans-serif, system-ui;
            --ease: cubic-bezier(.2, .9, .2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: linear-gradient(145deg, #d8e0ce 0%, #e4e9dc 50%, #cdd8c2 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .18;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        .blob1 {
            width: 400px;
            height: 400px;
            background: #8ec63f;
            top: -100px;
            left: -100px;
        }

        .blob2 {
            width: 300px;
            height: 300px;
            background: #c8f000;
            bottom: -50px;
            right: -50px;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, .78);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1.5px solid rgba(180, 200, 150, .35);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(60, 90, 40, .14), 0 4px 20px rgba(60, 90, 40, .08);
            padding: 40px 36px;
            position: relative;
            z-index: 1;
            animation: slideUp .5s var(--ease) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .cloud-icon {
            display: block;
            margin: 0 auto 18px;
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, .10));
            animation: cloudFloat 5s ease-in-out infinite;
        }

        @keyframes cloudFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -.5px;
            background: linear-gradient(135deg, #3d4a2a 0%, #6a8030 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            height: 48px;
            border-radius: 14px;
            border: 1.5px solid rgba(160, 175, 140, .35);
            background: rgba(255, 255, 255, .72);
            padding: 0 16px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: border-color .18s, box-shadow .18s;
        }

        input:focus {
            border-color: var(--a);
            box-shadow: 0 0 0 3px rgba(142, 198, 63, .18);
        }

        input::placeholder {
            color: var(--muted);
            font-weight: 400;
        }

        .btn-login {
            width: 100%;
            height: 52px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #8ec63f, #b8e04a);
            color: #fff;
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: .1px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(142, 198, 63, .38);
            transition: all .2s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 32px rgba(142, 198, 63, .48);
        }

        .btn-login:active {
            transform: scale(.98);
        }

        .btn-login:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1.5px solid rgba(224, 82, 82, .28);
            background: rgba(224, 82, 82, .08);
            color: #c0392b;
            font-size: 12.5px;
            font-weight: 600;
            line-height: 1.4;
            text-align: center;
        }

        .error-msg.show {
            display: block;
            animation: shake .35s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: var(--muted);
        }

        /* Spinner dentro del botón */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="card">
        <div class="logo">
            <svg class="cloud-icon" width="160" height="96" viewBox="0 0 320 180" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="cg1" cx="45%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#f2f4f0" />
                        <stop offset="100%" stop-color="#c4cac0" />
                    </radialGradient>
                    <radialGradient id="cg2" cx="50%" cy="30%" r="65%">
                        <stop offset="0%" stop-color="#e6e9e3" />
                        <stop offset="100%" stop-color="#b8beb4" />
                    </radialGradient>
                </defs>
                <!-- Nube de fondo (derecha, más pequeña) -->
                <path
                    d="M204 136 C190 136 182 126 183 114 C184 100 196 92 210 95 C214 80 228 72 244 76 C256 62 276 66 282 82 C296 82 306 94 302 108 C300 122 288 130 274 130 Z"
                    fill="url(#cg2)" opacity="0.7" />
                <!-- Nube principal -->
                <path
                    d="M18 148 C6 148 -2 136 2 122 C-4 106 8 92 24 90 C24 68 44 52 68 54 C76 34 98 22 124 30 C138 12 164 14 176 34 C198 30 216 48 212 70 C230 74 240 92 234 110 C234 128 220 140 204 140 C196 152 180 156 164 148 C150 158 130 158 116 148 C100 158 80 156 66 146 C50 154 30 154 18 148 Z"
                    fill="url(#cg1)" />
                <!-- Brillo pequeño en la cima -->
                <ellipse cx="130" cy="46" rx="32" ry="12" fill="white" opacity="0.30" />
                <!-- Sombra inferior difusa -->
                <ellipse cx="132" cy="165" rx="90" ry="8" fill="rgba(0,0,0,0.06)" />
            </svg>
            <h1>IAMx · Comalcalco</h1>
            <p>Nube Municipal Inteligente<br>Acceso restringido a usuarios autorizados</p>
        </div>

        <div class="field">
            <label for="username">Usuario</label>
            <input id="username" type="text" placeholder="Ingresa tu usuario" autocomplete="username" />
        </div>
        <div class="field">
            <label for="password">Contraseña</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button class="btn-login" id="btnLogin" onclick="doLogin()">Entrar</button>
        <div class="error-msg" id="errMsg">Usuario o contraseña incorrectos</div>
        <div style="text-align:center;margin-top:12px">
            <button onclick="showRecovery()"
                style="background:none;border:none;cursor:pointer;font-size:11.5px;color:var(--muted);font-family:var(--sans);font-weight:600;text-decoration:underline;text-underline-offset:3px">¿Olvidé
                mi contraseña?</button>
        </div>
        <div class="footer">IAMx · Nube Municipal Inteligente · Comalcalco 2026</div>
    </div>

    <!-- Formulario de recuperación por PIN -->
    <div class="card" id="recForm" style="display:none">
        <div class="logo" style="margin-bottom:20px">
            <div style="font-size:28px;margin-bottom:8px">📌</div>
            <h1>Recuperar Acceso</h1>
            <p>Ingresa tu usuario y el PIN de 4 dígitos que configuraste.</p>
        </div>
        <div class="field">
            <label for="recUser">Usuario</label>
            <input id="recUser" type="text" placeholder="Tu nombre de usuario" autocomplete="off" />
        </div>
        <div class="field">
            <label for="recPin">PIN de recuperación (4 dígitos)</label>
            <input id="recPin" type="number" placeholder="1234" style="letter-spacing:6px" />
        </div>
        <div class="field">
            <label for="recNewPwd">Nueva contraseña</label>
            <input id="recNewPwd" type="password" placeholder="Mín. 8 caracteres" />
        </div>
        <div class="error-msg" id="recErr"></div>
        <button class="btn-login" onclick="doRecover()">Cambiar contraseña</button>
        <div style="text-align:center;margin-top:12px">
            <button onclick="showLogin()"
                style="background:none;border:none;cursor:pointer;font-size:11.5px;color:var(--muted);font-family:var(--sans);font-weight:600;text-decoration:underline;text-underline-offset:3px">←
                Volver al login</button>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ─ Supabase Setup ─
        const SUPABASE_URL = 'https://xtyhmghbmsirmlxsxxut.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0eWhtZ2hibXNpcm1seHN4eHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTQ4NjksImV4cCI6MjA4ODY3MDg2OX0.TGV95qf9I1MnQuqs_6HCwSgSTzaVyG5m7MWkvrgglww';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SUPER = { username: 'iamx', password: 'NubeComalcalco2026!', role: 'superadmin' };

        // ─ Backend Sync ─
        async function saveToDB(key, val) {
            try {
                const { error } = await supabase.from('records').upsert({ key: key, value: val });
                if (error) console.error('Supabase save error:', error);
            } catch (e) { console.error('Error syncing to DB', e); }
        }

        function getSupervisors() {
            try { return JSON.parse(localStorage.getItem('iamx_supervisors') || '[]'); } catch (e) { return []; }
        }

        async function getSupervisorsAsync() {
            try {
                const { data, error } = await supabase.from('records').select('value').eq('key', 'iamx_supervisors').maybeSingle();
                if (data && data.value) {
                    localStorage.setItem('iamx_supervisors', JSON.stringify(data.value));
                    return Array.isArray(data.value) ? data.value : [];
                }
            } catch (e) { console.error('Failed to load from DB:', e); }
            return getSupervisors();
        }

        async function getPinAsync(u) {
            try {
                const { data, error } = await supabase.from('records').select('value').eq('key', 'iamx_pin_' + u).maybeSingle();
                if (data && data.value) return data.value;
            } catch (e) { console.error('Failed to load PIN from DB:', e); }
            return localStorage.getItem('iamx_pin_' + u);
        }

        function showRecovery() {
            document.querySelector('.card').style.display = 'none';
            document.getElementById('recForm').style.display = 'block';
        }
        function showLogin() {
            document.querySelector('.card').style.display = 'block';
            document.getElementById('recForm').style.display = 'none';
            document.getElementById('recErr').classList.remove('show');
        }

        async function doRecover() {
            const u = document.getElementById('recUser').value.trim();
            const pin = document.getElementById('recPin').value.trim();
            const newPwd = document.getElementById('recNewPwd').value;
            const errEl = document.getElementById('recErr');
            errEl.classList.remove('show');
            if (!u || !pin || !newPwd) { showRecErr('Completa todos los campos'); return; }
            if (newPwd.length < 8) { showRecErr('La nueva contraseña debe tener al menos 8 caracteres'); return; }

            const savedPin = await getPinAsync(u);
            if (!savedPin) { showRecErr('Este usuario no tiene un PIN configurado. Contacta al administrador.'); return; }
            if (savedPin !== pin) { showRecErr('PIN incorrecto'); return; }
            const sups = await getSupervisorsAsync();
            const idx = sups.findIndex(s => s.username === u);
            if (idx === -1) { showRecErr('Usuario no encontrado'); return; }
            sups[idx].password = newPwd;
            localStorage.setItem('iamx_supervisors', JSON.stringify(sups));
            saveToDB('iamx_supervisors', sups);
            showLogin();
            showError('✅ Contraseña actualizada. Puedes iniciar sesión.');
        }

        function showRecErr(msg) {
            const el = document.getElementById('recErr');
            el.textContent = msg;
            el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
        }

        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('errMsg');
            err.classList.remove('show');
            if (!u || !p) { showError('Completa todos los campos'); return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';

            if (u === SUPER.username && p === SUPER.password) {
                setSession({ username: u, role: 'superadmin', name: 'Super Admin IAMx' });
                window.location.href = 'admin.html'; return;
            }

            const supervisors = await getSupervisorsAsync();
            const found = supervisors.find(s => s.username === u && s.password === p);

            setTimeout(() => {
                if (found) {
                    setSession({ username: u, role: 'supervisor', name: found.name, id: found.id });
                    window.location.href = 'tablero_control_equipos_comalcalco.html'; return;
                }
                btn.disabled = false;
                btn.innerHTML = 'Entrar';
                showError('Usuario o contraseña incorrectos');
            }, 600);
        }

        function setSession(user) { sessionStorage.setItem('iamx_session', JSON.stringify(user)); }

        function showError(msg) {
            const err = document.getElementById('errMsg');
            err.textContent = msg;
            err.classList.remove('show'); void err.offsetWidth; err.classList.add('show');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        const sess = sessionStorage.getItem('iamx_session');
        if (sess) {
            const s = JSON.parse(sess);
            if (s.role === 'superadmin') window.location.href = 'admin.html';
            else window.location.href = 'tablero_control_equipos_comalcalco.html';
        }
    </script>
</body>

</html>
