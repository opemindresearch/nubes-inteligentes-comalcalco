<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anexo 2 · IAMx Comalcalco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --a: #8ec63f;
            --b: #4a7a0a;
            --bg: #f2f5ec;
            --card: rgba(255, 255, 255, .82);
            --text: #1a2210;
            --muted: #6b7d55;
            --border: rgba(140, 160, 100, .28);
            --sans: 'Inter', system-ui, sans-serif;
            --ease: cubic-bezier(.4, 0, .2, 1);
        }

        body {
            background: var(--bg);
            font-family: var(--sans);
            color: var(--text);
            min-height: 100vh;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(240, 244, 234, .9);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .tb-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tb-logo {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -.5px;
            color: var(--b);
        }

        .tb-sub {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
        }

        .tb-actions {
            display: flex;
            gap: 8px;
        }

        .btn-back,
        .btn-save {
            padding: 6px 14px;
            border-radius: 999px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .18s;
            border: none;
        }

        .btn-back {
            background: rgba(255, 255, 255, .7);
            color: var(--muted);
            border: 1.5px solid var(--border);
        }

        .btn-back:hover {
            border-color: var(--a);
            color: var(--b);
        }

        .btn-save {
            background: linear-gradient(135deg, #8ec63f, #b8e04a);
            color: #fff;
            box-shadow: 0 4px 14px rgba(142, 198, 63, .3);
        }

        .btn-save:hover {
            box-shadow: 0 6px 22px rgba(142, 198, 63, .45);
            transform: translateY(-1px);
        }

        /* HERO */
        .hero {
            padding: 30px 24px 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -.5px;
            margin-bottom: 4px;
        }

        .hero p {
            font-size: 13px;
            color: var(--muted);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 24px 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .tab {
            padding: 8px 22px;
            border-radius: 999px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .18s;
            border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, .6);
            color: var(--muted);
        }

        .tab.active {
            background: linear-gradient(135deg, #8ec63f, #b8e04a);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(142, 198, 63, .3);
        }

        .tab:hover:not(.active) {
            border-color: var(--a);
            color: var(--b);
        }

        /* STATUS BADGE */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 16px;
        }

        .status-draft {
            background: rgba(180, 180, 180, .15);
            color: #7a7a7a;
            border: 1px solid rgba(180, 180, 180, .3);
        }

        .status-pending {
            background: rgba(255, 170, 0, .12);
            color: #b07700;
            border: 1px solid rgba(255, 170, 0, .25);
        }

        .status-approved {
            background: rgba(142, 198, 63, .14);
            color: var(--b);
            border: 1px solid rgba(142, 198, 63, .3);
        }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(40, 60, 20, .08);
            padding: 28px;
            margin: 0 auto 24px;
            max-width: 900px;
            margin-left: auto;
            margin-right: 24px;
        }

        @media(max-width:960px) {
            .card {
                margin: 0 16px 20px;
            }
        }

        .card-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: 18px;
        }

        /* HEADER INFO */
        .proj-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .ph-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ph-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .ph-input {
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            background: rgba(255, 255, 255, .7);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .ph-input:focus {
            border-color: var(--a);
            box-shadow: 0 0 0 3px rgba(142, 198, 63, .15);
        }

        .ph-input[readonly] {
            background: rgba(240, 244, 234, .6);
            color: var(--muted);
            cursor: default;
        }

        /* ANEXO TABLE */
        .anexo-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .anexo-table th {
            background: rgba(142, 198, 63, .15);
            padding: 10px 8px;
            text-align: center;
            font-size: 10.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--b);
            border: 1px solid var(--border);
        }

        .anexo-table td {
            border: 1px solid var(--border);
            padding: 8px 8px;
            vertical-align: middle;
        }

        .anexo-table td input,
        .anexo-table td select {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            padding: 2px 4px;
        }

        .anexo-table td input[readonly] {
            color: var(--muted);
            cursor: default;
        }

        .anexo-table .total-row td {
            background: rgba(142, 198, 63, .08);
            font-weight: 800;
            font-size: 12px;
            padding: 10px 8px;
        }

        .total-label {
            text-align: right;
            font-weight: 800;
            color: var(--b);
        }

        /* ASESOR FIELD */
        .asesor-wrap {
            margin-bottom: 20px;
        }

        .asesor-input {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid var(--border);
            background: transparent;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            padding: 6px 4px;
            outline: none;
            transition: border-color .15s;
        }

        .asesor-input:focus {
            border-bottom-color: var(--a);
        }

        .asesor-input[readonly] {
            color: var(--muted);
            cursor: default;
        }

        /* FIRMAS */
        .firma-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 40px;
            margin-top: 8px;
        }

        .firma-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .firma-line {
            border-bottom: 1.5px solid var(--text);
            padding-bottom: 4px;
            min-height: 40px;
        }

        .firma-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-align: center;
            line-height: 1.4;
        }

        .firma-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            padding: 2px 4px;
            outline: none;
            text-align: center;
        }

        .firma-input[readonly] {
            color: var(--muted);
            cursor: default;
        }

        .firma-signed {
            font-size: 12px;
            color: var(--b);
            font-weight: 700;
            text-align: center;
            padding: 4px;
        }

        /* VISTO BUENO */
        .vobo-row {
            display: flex;
            gap: 40px;
            margin-top: 28px;
            align-items: flex-end;
        }

        .vobo-left {
            flex: 1;
        }

        .vobo-right {
            flex: 1;
        }

        .vobo-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .ccps {
            margin-top: 28px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .ccp-item {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 3px;
        }

        /* ACTIONS */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 24px 32px;
            max-width: 900px;
        }

        .act-btn {
            padding: 10px 22px;
            border-radius: 13px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: all .2s;
        }

        .act-btn.primary {
            background: linear-gradient(135deg, #8ec63f, #b8e04a);
            color: #fff;
            box-shadow: 0 4px 14px rgba(142, 198, 63, .3);
        }

        .act-btn.primary:hover {
            box-shadow: 0 6px 22px rgba(142, 198, 63, .45);
            transform: translateY(-1px);
        }

        .act-btn.secondary {
            background: rgba(255, 255, 255, .7);
            color: var(--muted);
            border: 1.5px solid var(--border);
        }

        .act-btn.secondary:hover {
            border-color: var(--a);
            color: var(--b);
        }

        .act-btn.approve {
            background: linear-gradient(135deg, #4a7a0a, #6da020);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 122, 10, .3);
        }

        .act-btn.approve:hover {
            box-shadow: 0 6px 22px rgba(74, 122, 10, .4);
            transform: translateY(-1px);
        }

        .act-btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none !important;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: rgba(30, 40, 20, .9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            transition: transform .3s var(--ease), opacity .3s;
            z-index: 999;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="tb-left">
            <div>
                <div class="tb-logo">IAMx · Anexo 2</div>
                <div class="tb-sub">Formato TecNM · Proyectos de Servicio Social</div>
            </div>
        </div>
        <div class="tb-actions">
            <button class="btn-back" onclick="window.location.href='tablero_control_equipos_comalcalco.html'">←
                Tablero</button>
            <button class="btn-save" onclick="guardarBorrador()">💾 Guardar</button>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>Acuerdo de Servicio Social · Anexo 2</h1>
        <p>Formato oficial TecNM. Los supervisores llenan los campos; el administrador (IAMx) autoriza y aprueba.</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" id="tab_N" onclick="switchTab('N')">Proyecto N — Reporte Ciudadano</button>
        <button class="tab" id="tab_U" onclick="switchTab('U')">Proyecto U — Ventanilla Única</button>
        <button class="tab" id="tab_B" onclick="switchTab('B')">Proyecto B — Semáforo Inteligente</button>
    </div>

    <!-- FORMULARIO -->
    <div id="formArea" style="padding: 0 24px;max-width:900px;margin:0 auto 0;padding-left:0;"></div>

    <!-- ACCIONES -->
    <div class="actions" id="actionsArea"></div>

    <div class="toast" id="toast"></div>

    <script>
        /* ── Configuración de proyecto por letra ── */
        const PROJECTS = {
            N: { name: 'Reporte Ciudadano Inteligente', clave: 'ISS-N-01', creditos: 10, competencia: 'Desarrollo de Sistemas Inteligentes', docentes: ['M.C. Nombre del Asesor Interno 1'], periodoDesarrolla: 'Ago 2025 – Ago 2026', periodoAcredita: 'Feb-Ago 2026' },
            U: { name: 'Ventanilla Única Digital', clave: 'ISS-U-01', creditos: 10, competencia: 'Gestión Digital de Servicios Municipales', docentes: ['M.C. Nombre del Asesor Interno 2'], periodoDesarrolla: 'Ago 2025 – Ago 2026', periodoAcredita: 'Feb-Ago 2026' },
            B: { name: 'Semáforo Inteligente', clave: 'ISS-B-01', creditos: 10, competencia: 'Visión Artificial e IoT para Movilidad Urbana', docentes: ['M.C. Nombre del Asesor Interno 3'], periodoDesarrolla: 'Ago 2025 – Ago 2026', periodoAcredita: 'Feb-Ago 2026' }
        };
        /* Fases del proyecto */
        const FASES = [
            { id: 'F1', modulo: 'Investigación y Arquitectura', horas: 80 },
            { id: 'F2', modulo: 'Prototipo Inicial', horas: 80 },
            { id: 'F3', modulo: 'Desarrollo de Módulos', horas: 100 },
            { id: 'F4', modulo: 'Integración del Sistema', horas: 100 },
            { id: 'F5', modulo: 'Pruebas y Ajustes', horas: 80 },
            { id: 'F6', modulo: 'Entrega y Despliegue', horas: 60 }
        ];
        const TOTAL_HORAS = FASES.reduce((s, f) => s + f.horas, 0);

        /* ── Roles y sesión ── */
        function getCurrentUser() {
            try { return JSON.parse(sessionStorage.getItem('iamx_session') || '{}'); } catch (e) { return {}; }
        }
        const CURUSER = getCurrentUser();
        if (!CURUSER.username) { window.location.href = 'login.html'; }

        let curProj = 'N';

        // ─ Backend Sync ─
        async function saveToDB(key, val) {
            try {
                await fetch('http://localhost:3000/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value: val })
                });
            } catch (e) { console.error('Error syncing to DB', e); }
        }

        function lsKey(proj) { return `iamx_anexo2_${proj}`; }

        function loadData(proj) {
            try { return JSON.parse(localStorage.getItem(lsKey(proj)) || 'null'); } catch (e) { return null; }
        }
        function saveData(proj, data) {
            localStorage.setItem(lsKey(proj), JSON.stringify(data));
            saveToDB(lsKey(proj), data);
        }

        function getDefault(proj) {
            const p = PROJECTS[proj];
            return {
                status: 'draft', // draft | pending | approved
                proyecto: p.name, clave: p.clave, creditos: p.creditos,
                competencia: p.competencia, docente_ped: p.docentes[0],
                horas_total: TOTAL_HORAS,
                periodo_desarrolla: p.periodoDesarrolla, periodo_acredita: p.periodoAcredita,
                asesor: '',
                fases: FASES.map(f => ({ id: f.id, modulo: f.modulo, horas: f.horas, competencia_disc: p.competencia })),
                firmas: {
                    presidente: { nombre: '', firmado: false, fecha: '' },
                    secretario: { nombre: '', firmado: false, fecha: '' },
                    docente_rel: { nombre: '', firmado: false, fecha: '' },
                    jefe_depto: { nombre: '', firmado: false, fecha: '' },
                    superadmin: { nombre: '', aprobado: false, fecha: '' }
                },
                nota_elabora: ''
            };
        }

        function switchTab(proj) {
            curProj = proj;
            ['N', 'U', 'B'].forEach(p => {
                document.getElementById('tab_' + p).classList.toggle('active', p === proj);
            });
            render();
        }

        function statusLabel(s) {
            if (s === 'approved') return '<span class="status-badge status-approved">✅ Aprobado</span>';
            if (s === 'pending') return '<span class="status-badge status-pending">⏳ Pendiente de aprobación</span>';
            return '<span class="status-badge status-draft">📝 Borrador</span>';
        }

        function render() {
            const p = PROJECTS[curProj];
            const data = loadData(curProj) || getDefault(curProj);
            const isAdmin = CURUSER.role === 'superadmin';
            const readOnly = data.status === 'approved' && !isAdmin;
            const ro = readOnly ? 'readonly' : '';

            let html = `
        <div class="card">
          <div class="card-title">Datos Generales del Proyecto</div>
          ${statusLabel(data.status)}
          <div class="proj-header">
            <div class="ph-field">
              <label class="ph-label">Nombre del Proyecto</label>
              <input class="ph-input" id="f_nombre" value="${esc(data.proyecto || p.name)}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Clave y Asignatura (3)</label>
              <input class="ph-input" id="f_clave" value="${esc(data.clave || p.clave)}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Créditos (4)</label>
              <input class="ph-input" id="f_creditos" type="number" value="${data.creditos || 10}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Competencia Disciplinar (5)</label>
              <input class="ph-input" id="f_competencia" value="${esc(data.competencia || p.competencia)}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Docente relacionado con el PED (6)</label>
              <input class="ph-input" id="f_docente_ped" value="${esc(data.docente_ped || p.docentes[0])}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Horas Totales (7)</label>
              <input class="ph-input" id="f_horas" type="number" value="${data.horas_total || TOTAL_HORAS}" readonly/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Periodo en que se Desarrolla (8)</label>
              <input class="ph-input" id="f_periodo_d" value="${esc(data.periodo_desarrolla || p.periodoDesarrolla)}" ${ro}/>
            </div>
            <div class="ph-field">
              <label class="ph-label">Periodo en que se Acredita (9)</label>
              <input class="ph-input" id="f_periodo_a" value="${esc(data.periodo_acredita || p.periodoAcredita)}" ${ro}/>
            </div>
          </div>

          <!-- TABLA DE MÓDULOS / FASES (columnas 3-9) -->
          <div class="card-title" style="margin-bottom:14px">Desglose por Fase · Módulo (TOTAL ${TOTAL_HORAS} horas)</div>
          <div style="overflow-x:auto">
          <table class="anexo-table">
            <thead>
              <tr>
                <th>Fase</th>
                <th>Módulo / Actividad</th>
                <th>Competencia Disciplinar (5)</th>
                <th>Horas (7)</th>
              </tr>
            </thead>
            <tbody>
              ${FASES.map((f, i) => `
              <tr>
                <td style="text-align:center;font-weight:800;color:var(--b)">${f.id}</td>
                <td><input value="${esc(data.fases?.[i]?.modulo || f.modulo)}" ${ro} data-fi="${i}" data-field="modulo" class="fase-input"/></td>
                <td><input value="${esc(data.fases?.[i]?.competencia_disc || p.competencia)}" ${ro} data-fi="${i}" data-field="competencia_disc" class="fase-input"/></td>
                <td style="text-align:center"><input type="number" value="${data.fases?.[i]?.horas || f.horas}" ${ro} data-fi="${i}" data-field="horas" class="fase-input" style="text-align:center;width:60px"/></td>
              </tr>`).join('')}
              <tr class="total-row">
                <td colspan="3" class="total-label">TOTAL (10)</td>
                <td style="text-align:center;font-weight:800;color:var(--b)">${TOTAL_HORAS}</td>
              </tr>
            </tbody>
          </table>
          </div>

          <!-- ASESOR -->
          <div class="asesor-wrap" style="margin-top:20px">
            <label class="ph-label" style="margin-bottom:8px;display:block">Propuesta de Asesor(es) Interno(s) Dual(es)</label>
            <textarea class="asesor-input" id="f_asesor" rows="2" ${ro} placeholder="Nombre(s) del/los asesor(es) interno(s)...">${esc(data.asesor || '')}</textarea>
          </div>
          <div class="asesor-wrap">
            <label class="ph-label" style="margin-bottom:8px;display:block">Elabora — Nombre y descripción</label>
            <input class="asesor-input" id="f_elabora" ${ro} value="${esc(data.nota_elabora || '')}" placeholder="Equipo de supervisores IAMx Comalcalco"/>
          </div>
        </div>

        <!-- FIRMAS -->
        <div class="card">
          <div class="card-title">Firmas y Autorizaciones</div>
          <div class="firma-grid">
            ${firmaItem('presidente', 'Nombre y Firma del (de la) Presidente(a) de Academia (11)', data, readOnly)}
            ${firmaItem('secretario', 'Nombre y Firma del (de la) Secretario(a) de Academia (12)', data, readOnly)}
            ${firmaItem('docente_rel', 'Docente(s) Relacionado(s) con el PED (13)', data, readOnly)}
            ${firmaItem('jefe_depto', 'Nombre y Firma del (de la) Jefe(a) del Departamento (14)', data, readOnly, 'Vo.Bo.')}
          </div>

          <!-- SUPERADMIN APPROVAL -->
          <div style="margin-top:28px; padding-top:20px; border-top:1px solid var(--border)">
            <div class="vobo-title">Autorización — Superadmin IAMx</div>
            ${data.firmas.superadmin.aprobado
                    ? `<div class="firma-signed">✅ Aprobado por ${esc(data.firmas.superadmin.nombre)} el ${esc(data.firmas.superadmin.fecha)}</div>`
                    : isAdmin
                        ? `<div style="display:flex;gap:10px;margin-top:8px;align-items:center">
                     <input id="f_admin_nombre" class="ph-input" style="max-width:260px" placeholder="Nombre del autorizante" value="${esc(data.firmas.superadmin.nombre || '')}"/>
                     <button class="act-btn approve" onclick="adminApprove()">✅ Autorizar y Aprobar</button>
                   </div>`
                        : `<div class="firma-label" style="color:var(--muted);font-size:12px;padding:8px 0">Pendiente de autorización del administrador IAMx</div>`
                }
          </div>

          <div class="ccps">
            <div class="ccp-item">C.c.p. División de Estudios Profesionales.</div>
            <div class="ccp-item">C.c.p. Subdirección Académica.</div>
          </div>
        </div>`;

            document.getElementById('formArea').innerHTML = html;

            // Bind phase inputs
            document.querySelectorAll('.fase-input').forEach(inp => {
                inp.addEventListener('change', e => {
                    const fi = +e.target.dataset.fi;
                    const field = e.target.dataset.field;
                    const d = loadData(curProj) || getDefault(curProj);
                    if (!d.fases) d.fases = FASES.map(f => ({ ...f }));
                    d.fases[fi][field] = e.target.value;
                    saveData(curProj, d);
                });
            });

            renderActions(data, isAdmin);
        }

        function firmaItem(key, label, data, readOnly, prefix = '') {
            const f = data.firmas[key];
            if (f.firmado) return `<div class="firma-item">
        <div class="firma-signed">✅ ${prefix ? prefix + ' — ' : ''}Firmado: ${esc(f.nombre)}<br><small>${esc(f.fecha)}</small></div>
        <div class="firma-label">${label}</div>
      </div>`;
            // Supervisors can sign their own slot
            const isSup = CURUSER.role === 'supervisor';
            const canSign = !readOnly && (isSup || CURUSER.role === 'superadmin');
            return `<div class="firma-item">
        <div class="firma-line">
          <input id="fn_${key}" class="firma-input" placeholder="Nombre completo" value="${esc(f.nombre || '')}" ${readOnly ? 'readonly' : ''}/>
          ${canSign ? `<button style="margin-top:4px;font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--a);background:transparent;color:var(--b);cursor:pointer;font-weight:700" onclick="firmar('${key}')">Firmar</button>` : ''}
        </div>
        <div class="firma-label">${prefix ? prefix + '<br>' : ''} ${label}</div>
      </div>`;
        }

        function renderActions(data, isAdmin) {
            const area = document.getElementById('actionsArea');
            let btns = '';
            if (data.status === 'draft') {
                btns += `<button class="act-btn secondary" onclick="guardarBorrador()">💾 Guardar Borrador</button>`;
                btns += `<button class="act-btn primary" onclick="enviarRevision()">📤 Enviar a revisión</button>`;
            } else if (data.status === 'pending') {
                btns += `<button class="act-btn secondary" onclick="guardarBorrador()">💾 Guardar cambios</button>`;
                if (isAdmin) btns += `<button class="act-btn approve" onclick="adminApprove()">✅ Autorizar y Aprobar</button>`;
                else btns += `<span style="font-size:12px;color:var(--muted);padding:10px 0;font-weight:600">⏳ En revisión — pendiente de aprobación del administrador</span>`;
            } else if (data.status === 'approved') {
                btns += `<span style="font-size:13px;color:var(--b);font-weight:800;padding:10px 0">✅ Documento aprobado y autorizado</span>`;
                if (isAdmin) btns += `<button class="act-btn secondary" onclick="revertDraft()">↩ Reabrir para edición</button>`;
            }
            area.innerHTML = btns;
        }

        function collectForm() {
            const d = loadData(curProj) || getDefault(curProj);
            const g = id => document.getElementById(id);
            if (g('f_nombre')) d.proyecto = g('f_nombre').value;
            if (g('f_clave')) d.clave = g('f_clave').value;
            if (g('f_creditos')) d.creditos = +g('f_creditos').value;
            if (g('f_competencia')) d.competencia = g('f_competencia').value;
            if (g('f_docente_ped')) d.docente_ped = g('f_docente_ped').value;
            if (g('f_periodo_d')) d.periodo_desarrolla = g('f_periodo_d').value;
            if (g('f_periodo_a')) d.periodo_acredita = g('f_periodo_a').value;
            if (g('f_asesor')) d.asesor = g('f_asesor').value;
            if (g('f_elabora')) d.nota_elabora = g('f_elabora').value;
            return d;
        }

        function guardarBorrador() {
            const d = collectForm(); saveData(curProj, d); toast('💾 Borrador guardado');
        }
        function enviarRevision() {
            const d = collectForm(); d.status = 'pending'; saveData(curProj, d); render(); toast('📤 Enviado a revisión');
        }
        function adminApprove() {
            const d = collectForm();
            const nombre = document.getElementById('f_admin_nombre')?.value || CURUSER.name || 'Super Admin IAMx';
            d.status = 'approved';
            d.firmas.superadmin = { nombre, aprobado: true, fecha: new Date().toLocaleDateString('es-MX') };
            saveData(curProj, d); render(); toast('✅ Documento aprobado');
        }
        function revertDraft() {
            const d = loadData(curProj) || getDefault(curProj);
            d.status = 'draft'; saveData(curProj, d); render(); toast('↩ Reabierto para edición');
        }
        function firmar(key) {
            const nombre = document.getElementById('fn_' + key)?.value?.trim();
            if (!nombre) { toast('⚠️ Escribe tu nombre antes de firmar'); return; }
            const d = loadData(curProj) || getDefault(curProj);
            d.firmas[key] = { nombre, firmado: true, fecha: new Date().toLocaleDateString('es-MX') };
            saveData(curProj, d); render(); toast('✍️ Firma registrada: ' + nombre);
        }
        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
        let _t;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            clearTimeout(_t); _t = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // Init
        render();
    </script>
</body>

</html>
